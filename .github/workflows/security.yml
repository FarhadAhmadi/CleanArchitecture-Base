name: Security

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore CleanArchitecture.slnx

      - name: NuGet Vulnerability Scan (Fail on Findings)
        run: |
          dotnet list CleanArchitecture.slnx package --vulnerable --include-transitive --format json > vulnerable-packages.json
          cat vulnerable-packages.json
          jq -e '
            [
              .projects[]?.frameworks[]?.topLevelPackages[]?,
              .projects[]?.frameworks[]?.transitivePackages[]?
            ]
            | map(select((.vulnerabilities // []) | length > 0))
            | length == 0
          ' vulnerable-packages.json

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  dast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: OWASP ZAP API Scan (OpenAPI Baseline)
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: "tests/ContractTests/Snapshots/openapi.v1.snapshot.json"
          format: openapi
          fail_action: true
          cmd_options: "-a"
